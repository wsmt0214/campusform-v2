spring:
  datasource:
    url: jdbc:mysql://localhost:3307/campusform_test?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: campusform
    password: campusform
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        "[format_sql]": true
        "[generate_statistics]": true
        jdbc:
          batch_size: 100
          batch_versioned_data: true
        order_inserts: true
        order_updates: true

logging:
  level:
    "[org.hibernate.SQL]": off
    "[org.hibernate.orm.jdbc.bind]": off
    "[org.hibernate.type.descriptor.sql.BasicBinder]": off
    "[org.hibernate.stat]": info

loadtest:
  sheet-sync:
    rows: 5000
    extra-columns: 5
    scenario: mixed
    ratio:
      new: 0.10
      unchanged: 0.70
      changed: 0.20
    random-seed: 42

