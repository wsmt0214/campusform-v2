name: Deploy To EC2

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Build application
        run: ./gradlew bootJar

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/campusform-server:latest
            ghcr.io/${{ github.repository_owner }}/campusform-server:${{ github.sha }}

      - name: Copy deploy assets to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml,deploy"
          target: "~/campusform-v2"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            mkdir -p ~/campusform-v2
            cd ~/campusform-v2

            IMAGE_URI="ghcr.io/${{ github.repository_owner }}/campusform-server:latest"

            if [ ! -f .env ]; then
              echo "ERROR: ~/campusform-v2/.env file is missing." >&2
              echo "Create it from deploy/.env.prod.example before running deploy." >&2
              exit 1
            fi

            # Normalize Windows-created env files before validation.
            sed -i '1s/^\xEF\xBB\xBF//' .env
            sed -i 's/\r$//' .env

            for required_var in MYSQL_ROOT_PASS DB_NAME MYSQL_USER_NAME MYSQL_USER_PASS; do
              if ! grep -Eq "^${required_var}=.+$" .env; then
                echo "ERROR: ${required_var} is missing or empty in ~/campusform-v2/.env." >&2
                exit 1
              fi
            done

            if grep -q '^IMAGE_URI=' .env; then
              sed -i "s|^IMAGE_URI=.*|IMAGE_URI=${IMAGE_URI}|" .env
            else
              echo "IMAGE_URI=${IMAGE_URI}" >> .env
            fi

            echo "${{ secrets.GHCR_PAT }}" | sudo docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            sudo docker compose -f docker-compose.prod.yml pull app
            sudo docker compose -f docker-compose.prod.yml up -d --remove-orphans
            sudo docker image prune -f
