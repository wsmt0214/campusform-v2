name: campusform-local

services:
  mysql:
    image: mysql:8.0
    container_name: campusform-local-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: campusform_test
      MYSQL_USER: campusform
      MYSQL_PASSWORD: campusform
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -proot || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - campusform_local_mysql_data:/var/lib/mysql

volumes:
  campusform_local_mysql_data:

